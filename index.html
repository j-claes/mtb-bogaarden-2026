<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MTB Avondrit Bogaarden 2026 GPX</title>
<style>
:root {
  color-scheme: light;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #f6fff8 0%, #e9f7ee 100%);
  color: #15311f;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  width: min(100%, 560px);
  background: rgba(255, 255, 255, 0.96);
  border-radius: 20px;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
  padding: 24px;
}

h1 {
  margin: 0 0 8px;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  line-height: 1.2;
}

p {
  margin: 0 0 18px;
  color: #4a5d4f;
  line-height: 1.5;
}

.route-list {
  display: grid;
  gap: 12px;
}

.route {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 58px;
  padding: 14px 16px;
  border-radius: 14px;
  color: white;
  text-decoration: none;
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: 700;
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  touch-action: manipulation;
}

.route:hover,
.route:focus-visible {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
}

.route .label {
  display: flex;
  align-items: center;
  gap: 10px;
}

.route .meta {
  font-size: 0.9rem;
  opacity: 0.95;
  white-space: nowrap;
}

.route-27 {
  background: linear-gradient(135deg, #2c7a3f, #3ca557);
}

.route-45 {
  background: linear-gradient(135deg, #2b6cb0, #4a90e2);
}

.route-52 {
  background: linear-gradient(135deg, #b33a3a, #d95a5a);
}

.status {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 12px;
  background: #f2f7f2;
  color: #33553b;
  border: 1px solid #d7e7dc;
  font-size: 0.95rem;
  line-height: 1.4;
}

.status.loading {
  background: #eef6ff;
  color: #234d6b;
  border-color: #cce2f3;
}

.status.success {
  background: #eefbf2;
  color: #2f5f3b;
  border-color: #c7e8d1;
}

.contact {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 12px;
  background: #fff7e8;
  border: 1px solid #f0d8a5;
  text-align: left;
}

.contact strong {
  display: block;
  margin-bottom: 4px;
  color: #7a4a12;
}

.contact a {
  color: #b45309;
  font-weight: 700;
  text-decoration: none;
}

.contact a:hover,
.contact a:focus-visible {
  text-decoration: underline;
}

@media (max-width: 480px) {
  .card {
    padding: 20px 16px;
  }

  .route {
    min-height: 64px;
    padding: 16px 14px;
  }
}
</style>
</head>

<body>
  <main class="card">
    <h1>MTB Avondrit Bogaarden 2026</h1>
    <p>Kies de gewenste route en download de GPX direct.</p>

    <div class="route-list">
      <a class="route route-27" href="bogaarden-mtb-2026-27km.gpx">
        <span class="label">🟢 <span>27 km</span></span>
        <span class="meta">GPX</span>
      </a>

      <a class="route route-45" href="bogaarden-mtb-2026-45km.gpx">
        <span class="label">🔵 <span>45 km</span></span>
        <span class="meta">GPX</span>
      </a>

      <a class="route route-52" href="bogaarden-mtb-2026-52km.gpx">
        <span class="label">🔴 <span>52 km</span></span>
        <span class="meta">GPX</span>
      </a>
    </div>

    <div id="status" class="status" role="status" aria-live="polite">
      Tik op een route om de download te starten.
    </div>

    <div class="contact" role="note">
      <strong>Pech of probleem?</strong>
      Bel <a href="tel:+31600000000">+31 6 0000 0000</a>
    </div>
  </main>

  <script>
    const status = document.getElementById('status');
    const routeLinks = document.querySelectorAll('.route');

    function setStatus(message, tone = 'default') {
      status.textContent = message;
      status.className = `status ${tone}`.trim();
    }

    function maybeNotify(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body, icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%232c7a3f"/><path d="M32 12v24m0 0l-8-8m8 8l8-8M18 42h28" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>' });
      }
    }

    routeLinks.forEach((link) => {
      link.addEventListener('click', async () => {
        const routeName = link.textContent.trim().replace(/GPX/g, '').trim();
        setStatus(`Download gestart voor ${routeName}...`, 'loading');

        if (navigator.vibrate) {
          navigator.vibrate(80);
        }

        if ('Notification' in window && Notification.permission === 'default') {
          try {
            await Notification.requestPermission();
          } catch (error) {
            // Ignore browser permission issues.
          }
        }

        maybeNotify('Download gestart', `${routeName} wordt gedownload.`);

        window.setTimeout(() => {
          setStatus(`${routeName} wordt verwerkt.`, 'success');
          maybeNotify('Download klaar', `${routeName} is klaar in je downloads.`);
        }, 1200);
      });
    });
  </script>
</body>
</html>
