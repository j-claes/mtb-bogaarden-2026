<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MTB Avondrit Bogaarden 2026 GPX</title>
<style>
:root {
  color-scheme: light;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #f6fff8 0%, #e9f7ee 100%);
  color: #15311f;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  width: min(100%, 560px);
  background: rgba(255, 255, 255, 0.96);
  border-radius: 20px;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
  padding: 24px;
}

h1 {
  margin: 0 0 8px;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  line-height: 1.2;
}

p {
  margin: 0 0 18px;
  color: #4a5d4f;
  line-height: 1.5;
}

.route-list {
  display: grid;
  gap: 12px;
}

.route {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 58px;
  padding: 14px 16px;
  border-radius: 14px;
  color: white;
  text-decoration: none;
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: 700;
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  touch-action: manipulation;
}

.route:hover,
.route:focus-visible {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
}

.route .label {
  display: flex;
  align-items: center;
  gap: 10px;
}

.route .meta {
  font-size: 0.9rem;
  opacity: 0.95;
  white-space: nowrap;
}

.route-27 {
  background: linear-gradient(135deg, #2c7a3f, #3ca557);
}

.route-45 {
  background: linear-gradient(135deg, #2b6cb0, #4a90e2);
}

.route-52 {
  background: linear-gradient(135deg, #b33a3a, #d95a5a);
}

@media (max-width: 480px) {
  .card {
    padding: 20px 16px;
  }

  .route {
    min-height: 64px;
    padding: 16px 14px;
  }
}
</style>
</head>

<body>
  <main class="card">
    <h1>MTB Avondrit Bogaarden 2026</h1>
    <p>Kies de gewenste route en download de GPX direct.</p>

    <div class="route-list">
      <a class="route route-27" href="Bogaarden-mtb-2026-27km.gpx">
        <span class="label">🟢 <span>27 km</span></span>
        <span class="meta">GPX</span>
      </a>

      <a class="route route-45" href="Bogaarden-mtb-2026-45Km.gpx">
        <span class="label">🔵 <span>45 km</span></span>
        <span class="meta">GPX</span>
      </a>

      <a class="route route-52" href="Bogaarden-mtb-2026-52Km.gpx">
        <span class="label">🔴 <span>52 km</span></span>
        <span class="meta">GPX</span>
      </a>
    </div>
  </main>
</body>
</html>
