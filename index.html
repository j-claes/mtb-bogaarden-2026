<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MTB Avondrit Bogaarden 2026 GPX</title>
<style>
:root {
  color-scheme: light;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Inter', Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg, #4ba568 0%, #58b96c 40%, #eff8ef 100%);
  color: #1f3620;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  width: min(100%, 620px);
  background: rgba(255, 255, 255, 0.98);
  border-radius: 24px;
  box-shadow: 0 20px 50px rgba(13, 47, 24, 0.16);
  padding: 26px;
  border: 1px solid rgba(46, 115, 64, 0.12);
}

.hero {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 18px;
  padding: 16px;
  background: #f7fffa;
  border-radius: 18px;
  border: 1px solid rgba(46, 115, 64, 0.14);
}

.logo {
  height: 70px;
  width: auto;
  object-fit: contain;
}

.hero h1 {
  margin: 0 0 6px;
  font-size: clamp(1.8rem, 4vw, 2.4rem);
}

.hero p {
  margin: 0;
  color: #365a42;
}

h1 {
  margin: 0 0 8px;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  line-height: 1.2;
}

p {
  margin: 0 0 18px;
  color: #4a5d4f;
  line-height: 1.5;
}

.route-list {
  display: grid;
  gap: 14px;
}

.route {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 58px;
  padding: 14px 16px;
  border-radius: 14px;
  color: white;
  text-decoration: none;
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: 700;
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  touch-action: manipulation;
}

.route:hover,
.route:focus-visible {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
}

.route .label {
  display: flex;
  align-items: center;
  gap: 10px;
}

.route .meta {
  font-size: 0.9rem;
  opacity: 0.95;
  white-space: nowrap;
}

.route-27 {
  background: linear-gradient(135deg, #297745, #52b05d);
}

.route-45 {
  background: linear-gradient(135deg, #2465a5, #4fa3dc);
}

.route-52 {
  background: linear-gradient(135deg, #a63d3d, #e46d6d);
}

.status {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 12px;
  background: #f2f7f2;
  color: #33553b;
  border: 1px solid #d7e7dc;
  font-size: 0.95rem;
  line-height: 1.4;
}

.status.loading {
  background: #eef6ff;
  color: #234d6b;
  border-color: #cce2f3;
}

.status.success {
  background: #eefbf2;
  color: #2f5f3b;
  border-color: #c7e8d1;
}

.contact {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 12px;
  background: #fff7e8;
  border: 1px solid #f0d8a5;
  text-align: left;
}

.contact strong {
  display: block;
  margin-bottom: 4px;
  color: #7a4a12;
}

.contact a {
  color: #b45309;
  font-weight: 700;
  text-decoration: none;
}

.contact a:hover,
.contact a:focus-visible {
  text-decoration: underline;
}

@media (max-width: 480px) {
  .card {
    padding: 20px 16px;
  }

  .route {
    min-height: 64px;
    padding: 16px 14px;
  }
}
</style>
</head>

<body>
  <main class="card">
    <div class="hero">
      <img class="logo" src="dorpsfeesten-logo.png" alt="Dorpsfeesten Bogaarden logo">
      <div>
        <h1>MTB Avondrit Bogaarden 2026</h1>
        <p>Kies de gewenste route en download de GPX direct.</p>
      </div>
    </div>

    <div class="route-list">
      <a class="route route-27" href="bogaarden-mtb-2026-27km.gpx" download="bogaarden-mtb-2026-27km.gpx">
        <span class="label">🟢 <span>28 km</span></span>
        <span class="meta">GPX</span>
      </a>

      <a class="route route-45" href="bogaarden-mtb-2026-45km.gpx" download="bogaarden-mtb-2026-45km.gpx">
        <span class="label">🔵 <span>45 km</span></span>
        <span class="meta">GPX</span>
      </a>

      <a class="route route-52" href="bogaarden-mtb-2026-52km.gpx" download="bogaarden-mtb-2026-52km.gpx">
        <span class="label">🔴 <span>54 km</span></span>
        <span class="meta">GPX</span>
      </a>
    </div>

    <div id="status" class="status" role="status" aria-live="polite">
      Tik op een route om de download te starten.
    </div>

    <div class="contact" role="note">
      <strong>Pech of probleem?</strong>
      Bel <a href="tel:+32495546086">+32 495 54 60 86</a>
    </div>
  </main>

  <script>
    const status = document.getElementById('status');
    const routeLinks = document.querySelectorAll('.route');

    function setStatus(message, tone = 'default') {
      status.textContent = message;
      status.className = `status ${tone}`.trim();
    }

    routeLinks.forEach((link) => {
      link.addEventListener('click', () => {
        const routeName = link.textContent.trim().replace(/GPX/g, '').trim();
        setStatus(`Download gestart voor ${routeName}...`, 'loading');

        if (navigator.vibrate) {
          navigator.vibrate(80);
        }

        window.setTimeout(() => {
          setStatus(`Controleer je downloads voor ${routeName}.`, 'success');
        }, 1000);
      });
    });
  </script>
</body>
</html>
